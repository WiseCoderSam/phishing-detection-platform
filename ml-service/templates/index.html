<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detection AI</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 1.5rem; }
        input[type="text"] { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: background-color 0.3s; }
        button:hover { background-color: #004494; }
        .result-box { margin-top: 1.5rem; padding: 1.5rem; border-radius: 4px; border: 1px solid #eee; background-color: #f9f9f9; }
        .safe { color: #155724; background-color: #d4edda; border-color: #c3e6cb; }
        .phishing { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
        .error { color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>Phishing Detector</h1>
    <form action="/predict" method="POST">
        <input type="text" name="url" placeholder="Enter URL to check..." required value="{{ url if url else '' }}">
        <button type="submit">Analyze URL</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    {% if result %}
    <div class="result-box {% if result == 'Safe' %}safe{% else %}phishing{% endif %}">
        <h2>Prediction: {{ result }}</h2>
        <p><strong>Confidence:</strong> {{ confidence }}%</p>
    </div>
    {% endif %}
</div>

</body>
</html>
